# Effort estimation matrix for PQC migration tasks.
# Base hours per (algorithm_family, context_type).
# These are conservative estimates for a typical enterprise codebase.

base_hours:
  # Asymmetric key algorithms — most complex migrations
  RSA:
    library_call: 8
    tls_config: 4
    certificate: 6
    key_management: 16
    custom_implementation: 40
  ECC:
    library_call: 8
    tls_config: 4
    certificate: 6
    key_management: 16
    custom_implementation: 40
  ECDSA:
    library_call: 8
    tls_config: 4
    certificate: 6
    key_management: 16
    custom_implementation: 40
  ECDH:
    library_call: 8
    tls_config: 4
    key_management: 16
    custom_implementation: 40
  DSA:
    library_call: 6
    tls_config: 4
    certificate: 6
    key_management: 12
    custom_implementation: 32
  DH:
    library_call: 8
    tls_config: 4
    key_management: 16
    custom_implementation: 40

  # Symmetric — simpler migrations
  DES:
    library_call: 2
    tls_config: 2
    custom_implementation: 8
  3DES:
    library_call: 2
    tls_config: 2
    custom_implementation: 8
  AES:
    library_call: 2
    tls_config: 1
    custom_implementation: 4
  RC4:
    library_call: 2
    tls_config: 2
    custom_implementation: 8
  Blowfish:
    library_call: 2
    custom_implementation: 6

  # Hashes — usually straightforward
  MD5:
    library_call: 1
    custom_implementation: 4
  SHA-1:
    library_call: 1
    custom_implementation: 4

# Complexity multipliers
multipliers:
  # Number of affected files
  files_1_5: 1.0
  files_6_20: 1.5
  files_21_50: 2.0
  files_50_plus: 3.0

  # Test coverage requirements
  with_tests: 1.5
  without_tests: 1.0

  # Language complexity
  python: 1.0
  java: 1.2
  cpp: 1.5
  csharp: 1.2
  golang: 1.1
  javascript: 1.0
  rust: 1.3
  swift: 1.2
  kotlin: 1.2
  php: 1.0
  ruby: 1.0

# PQC replacement recommendations
replacements:
  RSA:
    signatures: "ML-DSA-65 (FIPS 204)"
    key_exchange: "ML-KEM-768 (FIPS 203)"
    encryption: "ML-KEM-768 + AES-256-GCM"
  ECC:
    signatures: "ML-DSA-44 (FIPS 204)"
    key_exchange: "ML-KEM-512 (FIPS 203)"
  ECDSA:
    signatures: "ML-DSA-44 (FIPS 204)"
  ECDH:
    key_exchange: "ML-KEM-512 (FIPS 203)"
  DSA:
    signatures: "ML-DSA-44 (FIPS 204)"
  DH:
    key_exchange: "ML-KEM-768 (FIPS 203)"
  DES:
    encryption: "AES-256-GCM"
  3DES:
    encryption: "AES-256-GCM"
  RC4:
    encryption: "AES-256-GCM or ChaCha20-Poly1305"
  Blowfish:
    encryption: "AES-256-GCM"
  MD5:
    hashing: "SHA-256 or SHA-3-256"
  SHA-1:
    hashing: "SHA-256 or SHA-3-256"
