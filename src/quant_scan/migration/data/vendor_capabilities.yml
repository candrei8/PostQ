# Vendor capability matrix for PQC migration recommendations.

vendors:
  PQShield:
    description: "Hardware-focused PQC solutions provider"
    strengths:
      - "Hardware Security Modules (HSM) with PQC support"
      - "Embedded systems and IoT PQC"
      - "Low-latency cryptographic implementations"
      - "FIPS 140-3 certification path"
      - "Side-channel resistant implementations"
    best_for:
      - "HSM upgrades"
      - "Embedded/IoT devices"
      - "Low-latency applications"
      - "Government/defense"
    products:
      - "PQPlatform — SoC-level PQC"
      - "PQCryptoLib — software library"
    certifications:
      - "FIPS 140-3 (in progress)"
      - "Common Criteria"

  QuSecure:
    description: "Network-focused PQC orchestration platform"
    strengths:
      - "Network/TLS infrastructure migration"
      - "Orchestration platform for enterprise-wide PQC"
      - "Hybrid key management (classical + PQC)"
      - "Crypto-agile architecture"
      - "Cloud-native deployment"
