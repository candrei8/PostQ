# Detection rules for PHP source code.
# Each rule produces a Finding when its pattern matches.

rules:

  # -- RSA ------------------------------------------------------------------

  - id: PHP-RSA-GENERATE
    algorithm: RSA-generic
    pattern: "openssl_pkey_new.*RSA|OPENSSL_KEYTYPE_RSA"
    message: "RSA key generation detected"
    recommendation: "Migrate to ML-DSA (FIPS 204) for digital signatures or ML-KEM (FIPS 203) for key encapsulation"

  - id: PHP-RSA-IMPORT
    algorithm: RSA-generic
    pattern: "openssl_pkey_get_public|openssl_pkey_get_private"
    message: "RSA key import detected"
    recommendation: "Plan migration to post-quantum algorithms (ML-DSA, ML-KEM)"

  - id: PHP-RSA-KEYSIZE-1024
    algorithm: RSA-1024
    pattern: "private_key_bits.*1024"
    message: "RSA 1024-bit key size — critically insecure"
    recommendation: "Immediately migrate to ML-DSA-65 or ML-DSA-87. RSA-1024 is broken classically"

  - id: PHP-RSA-KEYSIZE-2048
    algorithm: RSA-2048
    pattern: "private_key_bits.*2048"
    message: "RSA 2048-bit key size — quantum vulnerable"
    recommendation: "Migrate to ML-DSA-65 for equivalent security in the post-quantum era"

  # -- ECC ------------------------------------------------------------------

  - id: PHP-ECC-GENERATE
    algorithm: ECC-generic
    pattern: "openssl_pkey_new.*EC|OPENSSL_KEYTYPE_EC"
    message: "Elliptic curve key generation detected"
    recommendation: "Migrate to ML-DSA for signatures or ML-KEM for key exchange"

  # -- DSA / DH -------------------------------------------------------------

  - id: PHP-DSA-GENERATE
    algorithm: DSA-generic
    pattern: "openssl_pkey_new.*DSA|OPENSSL_KEYTYPE_DSA"
    message: "DSA key generation detected — deprecated and quantum vulnerable"
    recommendation: "Migrate to ML-DSA (FIPS 204)"

  - id: PHP-DH-GENERATE
    algorithm: DH-generic
    pattern: "openssl_pkey_new.*DH|OPENSSL_KEYTYPE_DH"
    message: "Diffie-Hellman key generation detected — quantum vulnerable"
    recommendation: "Migrate to ML-KEM (FIPS 203) for key encapsulation"

  # -- DES / 3DES -----------------------------------------------------------

  - id: PHP-DES-USE
    algorithm: DES
    pattern: "openssl_encrypt\\(.*DES|mcrypt_encrypt.*MCRYPT_DES"
    message: "DES usage detected — broken cipher"
    recommendation: "Replace immediately with AES-256-GCM"

  - id: PHP-3DES-USE
    algorithm: 3DES
    pattern: "openssl_encrypt\\(.*des-ede3|MCRYPT_3DES"
    message: "3DES usage detected — deprecated"
    recommendation: "Replace with AES-256-GCM"

  # -- MD5 ------------------------------------------------------------------

  - id: PHP-MD5-USE
    algorithm: MD5
    pattern: "md5\\(|hash\\(\\s*['\"]md5|MD5\\("
    message: "MD5 hash usage detected — broken"
    recommendation: "Replace with SHA-256 or SHA-3. Never use MD5 for security purposes"

  # -- SHA-1 ----------------------------------------------------------------

  - id: PHP-SHA1-USE
    algorithm: SHA-1
    pattern: "sha1\\(|hash\\(\\s*['\"]sha1"
    message: "SHA-1 usage detected — broken"
    recommendation: "Replace with SHA-256 or SHA-3-256"

  # -- RC4 ------------------------------------------------------------------

  - id: PHP-RC4-USE
    algorithm: RC4
    pattern: "openssl_encrypt\\(.*rc4|MCRYPT_ARCFOUR"
    message: "RC4 usage detected — broken cipher"
    recommendation: "Replace with AES-256-GCM or ChaCha20-Poly1305"

  # -- Blowfish -------------------------------------------------------------

  - id: PHP-BLOWFISH-USE
    algorithm: Blowfish
    pattern: "openssl_encrypt\\(.*bf-|MCRYPT_BLOWFISH"
    message: "Blowfish usage detected — 64-bit block size, deprecated"
    recommendation: "Replace with AES-256"

  # -- ECB mode -------------------------------------------------------------

  - id: PHP-ECB-MODE
    algorithm: AES-128
    pattern: "openssl_encrypt\\(.*ecb|MCRYPT_MODE_ECB"
    message: "ECB mode detected — insecure block cipher mode"
    recommendation: "Use GCM or CBC mode with HMAC. ECB leaks plaintext patterns"

  # -- Weak random ----------------------------------------------------------

  - id: PHP-WEAK-RANDOM
    algorithm: RSA-generic
    pattern: "rand\\(|mt_rand\\(|array_rand\\(|srand\\("
    message: "Non-cryptographic PRNG usage detected"
    recommendation: "Use random_bytes() or random_int() for cryptographic randomness"
    severity_override: medium
    quantum_risk_override: unknown

  # -- mcrypt ---------------------------------------------------------------

  - id: PHP-MCRYPT-USE
    algorithm: RSA-generic
    pattern: "mcrypt_encrypt|mcrypt_decrypt|mcrypt_module_open"
    message: "mcrypt extension usage detected — deprecated and removed in PHP 7.2"
    recommendation: "Migrate to openssl_encrypt with AES-256-GCM"
    severity_override: high

  # -- phpseclib ------------------------------------------------------------

  - id: PHP-PHPSECLIB-RSA
    algorithm: RSA-generic
    pattern: "phpseclib.*RSA|RSA::createKey"
    message: "RSA usage via phpseclib detected"
    recommendation: "Migrate to post-quantum algorithms (ML-DSA, ML-KEM)"

  - id: PHP-PHPSECLIB-DSA
    algorithm: DSA-generic
    pattern: "phpseclib.*DSA|DSA::createKey"
    message: "DSA usage via phpseclib detected"
    recommendation: "Migrate to ML-DSA (FIPS 204)"

  # -- Sodium ---------------------------------------------------------------

  - id: PHP-SODIUM-USE
    algorithm: AES-128
    pattern: "sodium_crypto_|SODIUM_CRYPTO_"
    message: "Sodium library usage detected — generally quantum safe for symmetric operations"
    recommendation: "Sodium symmetric primitives are quantum-resistant; review key exchange for PQC readiness"
    quantum_risk_override: safe
    severity_override: info

  # -- OpenSSL sign ---------------------------------------------------------

  - id: PHP-OPENSSL-SIGN
    algorithm: RSA-generic
    pattern: "openssl_sign|openssl_verify"
    message: "OpenSSL signature operation detected"
    recommendation: "Audit signing algorithm; migrate RSA/ECDSA signatures to ML-DSA"

  # -- SSL/TLS --------------------------------------------------------------

  - id: PHP-SSL-WEAK
    algorithm: RSA-generic
    pattern: "STREAM_CRYPTO_METHOD_TLSv1_0|STREAM_CRYPTO_METHOD_SSLv3"
    message: "Weak TLS/SSL protocol version detected"
    recommendation: "Use TLS 1.3 and plan for post-quantum TLS"
    severity_override: high

  # -- crypt ----------------------------------------------------------------

  - id: PHP-CRYPT-USE
    algorithm: RSA-generic
    pattern: "crypt\\(|password_hash\\(.*PASSWORD_BCRYPT"
    message: "Legacy crypt/bcrypt usage detected"
    recommendation: "Consider Argon2id for password hashing (PASSWORD_ARGON2ID)"
