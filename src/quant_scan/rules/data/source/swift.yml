# Detection rules for Swift source code.
# Each rule produces a Finding when its pattern matches.

rules:

  # -- RSA ------------------------------------------------------------------

  - id: SW-RSA-GENERATE
    algorithm: RSA-generic
    pattern: "SecKeyGeneratePair|SecKeyCreateRandomKey.*kSecAttrKeyTypeRSA"
    message: "RSA key generation detected"
    recommendation: "Migrate to ML-DSA (FIPS 204) for digital signatures or ML-KEM (FIPS 203) for key encapsulation"

  - id: SW-RSA-IMPORT
    algorithm: RSA-generic
    pattern: "import\\s+Security|kSecAttrKeyTypeRSA"
    message: "RSA library import detected"
    recommendation: "Plan migration to post-quantum algorithms (ML-DSA, ML-KEM)"

  - id: SW-RSA-KEYSIZE-1024
    algorithm: RSA-1024
    pattern: "kSecAttrKeySizeInBits.*1024"
    message: "RSA 1024-bit key size — critically insecure"
    recommendation: "Immediately migrate to ML-DSA-65 or ML-DSA-87. RSA-1024 is broken classically"

  - id: SW-RSA-KEYSIZE-2048
    algorithm: RSA-2048
    pattern: "kSecAttrKeySizeInBits.*2048"
    message: "RSA 2048-bit key size — quantum vulnerable"
    recommendation: "Migrate to ML-DSA-65 for equivalent security in the post-quantum era"

  # -- ECC / ECDSA / ECDH --------------------------------------------------

  - id: SW-ECC-GENERATE
    algorithm: ECC-generic
    pattern: "P256\\.Signing\\.PrivateKey|P384\\.Signing\\.PrivateKey|P256\\.KeyAgreement|SecKeyCreateRandomKey.*kSecAttrKeyTypeEC"
    message: "Elliptic curve key generation detected"
    recommendation: "Migrate to ML-DSA for signatures or ML-KEM for key exchange"

  - id: SW-ECC-IMPORT
    algorithm: ECC-generic
    pattern: "import\\s+CryptoKit|CryptoKit\\.P256|CryptoKit\\.P384"
    message: "ECC/CryptoKit import detected"
    recommendation: "Plan migration to ML-DSA (signatures) or ML-KEM (key exchange)"

  - id: SW-ECDSA-USE
    algorithm: ECDSA-generic
    pattern: "ECDSASignature|ECDSA\\.Signing"
    message: "ECDSA usage detected"
    recommendation: "Migrate to ML-DSA for digital signatures"

  - id: SW-ECDH-USE
    algorithm: ECDH-generic
    pattern: "ECDH\\.PrivateKey|KeyAgreement\\.PrivateKey"
    message: "ECDH key agreement detected"
    recommendation: "Migrate to ML-KEM for key encapsulation"

  # -- DSA / DH -------------------------------------------------------------

  - id: SW-DSA-USE
    algorithm: DSA-generic
    pattern: "kSecAttrKeyTypeDSA|DSA"
    message: "DSA usage detected — deprecated and quantum vulnerable"
    recommendation: "Migrate to ML-DSA (FIPS 204)"

  - id: SW-DH-USE
    algorithm: DH-generic
    pattern: "kSecAttrKeyTypeDH|DiffieHellman"
    message: "Diffie-Hellman usage detected — quantum vulnerable"
    recommendation: "Migrate to ML-KEM (FIPS 203) for key encapsulation"

  # -- DES / 3DES -----------------------------------------------------------

  - id: SW-DES-USE
    algorithm: DES
    pattern: "CCAlgorithm.*kCCAlgorithmDES|kCCAlgorithm3DES|CCCrypt.*DES"
    message: "DES usage detected — broken cipher"
    recommendation: "Replace immediately with AES-256-GCM"

  - id: SW-3DES-USE
    algorithm: 3DES
    pattern: "kCCAlgorithm3DES|CCAlgorithm.*3DES|TripleDES"
    message: "3DES usage detected — deprecated"
    recommendation: "Replace with AES-256-GCM"

  # -- MD5 ------------------------------------------------------------------

  - id: SW-MD5-USE
    algorithm: MD5
    pattern: "CC_MD5|Insecure\\.MD5|CommonCrypto.*MD5"
    message: "MD5 hash usage detected — broken"
    recommendation: "Replace with SHA-256 or SHA-3. Never use MD5 for security purposes"

  # -- SHA-1 ----------------------------------------------------------------

  - id: SW-SHA1-USE
    algorithm: SHA-1
    pattern: "CC_SHA1|Insecure\\.SHA1|CommonCrypto.*SHA1"
    message: "SHA-1 usage detected — broken"
    recommendation: "Replace with SHA-256 or SHA-3-256"

  # -- RC4 ------------------------------------------------------------------

  - id: SW-RC4-USE
    algorithm: RC4
    pattern: "kCCAlgorithmRC4|CCAlgorithm.*RC4"
    message: "RC4 usage detected — broken cipher"
    recommendation: "Replace with AES-256-GCM or ChaCha20-Poly1305"

  # -- Blowfish -------------------------------------------------------------

  - id: SW-BLOWFISH-USE
    algorithm: Blowfish
    pattern: "kCCAlgorithmBlowfish|CCAlgorithm.*Blowfish"
    message: "Blowfish usage detected — 64-bit block size, deprecated"
    recommendation: "Replace with AES-256"

  # -- ECB mode -------------------------------------------------------------

  - id: SW-ECB-MODE
    algorithm: AES-128
    pattern: "kCCOptionECBMode|kCCModeCBC.*ECB"
    message: "ECB mode detected — insecure block cipher mode"
    recommendation: "Use GCM or CBC mode with HMAC. ECB leaks plaintext patterns"

  # -- Weak random ----------------------------------------------------------

  - id: SW-WEAK-RANDOM
    algorithm: RSA-generic
    pattern: "arc4random\\(\\)|drand48|srand48"
    message: "Non-cryptographic PRNG usage detected"
    recommendation: "Use SecRandomCopyBytes for cryptographic randomness"
    severity_override: medium
    quantum_risk_override: unknown

  # -- CommonCrypto ---------------------------------------------------------

  - id: SW-COMMONCRYPTO-IMPORT
    algorithm: RSA-generic
    pattern: "import\\s+CommonCrypto"
    message: "CommonCrypto import detected — check for deprecated algorithms"
    recommendation: "Audit CommonCrypto usage for weak algorithms and migrate to CryptoKit where possible"

  # -- Keychain RSA ---------------------------------------------------------

  - id: SW-KEYCHAIN-RSA
    algorithm: RSA-generic
    pattern: "SecItemAdd.*kSecAttrKeyTypeRSA"
    message: "RSA key stored in Keychain"
    recommendation: "Plan migration of stored RSA keys to post-quantum algorithms"

  # -- AES-128 --------------------------------------------------------------

  - id: SW-AES128-USE
    algorithm: AES-128
    pattern: "kCCKeySizeAES128|AES\\.GCM.*128"
    message: "AES-128 usage detected — reduced quantum security margin"
    recommendation: "Use AES-256 for full quantum resistance (Grover's algorithm halves effective key length)"

  # -- Weak SSL/TLS ---------------------------------------------------------

  - id: SW-SSL-WEAK
    algorithm: RSA-generic
    pattern: "SSLSetProtocolVersionMin.*kTLSProtocol1|kSSLProtocol3"
    message: "Weak TLS/SSL protocol version detected"
    recommendation: "Use TLS 1.3 and plan for post-quantum TLS"
